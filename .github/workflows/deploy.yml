name: Deploy to Coolify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -f -X POST \
            "https://dashboard.johnlawver.com/api/v1/deploy?uuid=zt40ninnaz037fgq67s2vtfx&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
